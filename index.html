<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pac-Man Clone - JS & Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    canvas {
      image-rendering: pixelated;
      touch-action: none;
      outline: none;
    }

    .control-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
  </style>
</head>
<body class="bg-[#04060d] text-white flex flex-col items-center justify-center min-h-screen overflow-hidden font-mono px-3 py-3">

  <div class="w-full max-w-[960px] flex flex-col items-center gap-4">
    <div class="relative shadow-2xl shadow-blue-900/20 w-full">
      <canvas
        id="gameCanvas"
        width="960"
        height="540"
        tabindex="0"
        class="block w-full h-auto rounded-lg"
      ></canvas>
    </div>

    <!-- Controles touch para celular -->
    <div class="md:hidden flex flex-col items-center gap-2 select-none">
      <button
        class="control-btn w-16 h-16 rounded-2xl bg-slate-800/90 border border-slate-600 text-2xl active:scale-95"
        data-dir="up"
        aria-label="Mover para cima"
      >↑</button>

      <div class="flex items-center gap-2">
        <button
          class="control-btn w-16 h-16 rounded-2xl bg-slate-800/90 border border-slate-600 text-2xl active:scale-95"
          data-dir="left"
          aria-label="Mover para esquerda"
        >←</button>

        <button
          id="restartBtn"
          class="control-btn w-16 h-16 rounded-2xl bg-blue-700/90 border border-blue-500 text-sm font-bold active:scale-95"
          aria-label="Reiniciar jogo"
        >R</button>

        <button
          class="control-btn w-16 h-16 rounded-2xl bg-slate-800/90 border border-slate-600 text-2xl active:scale-95"
          data-dir="right"
          aria-label="Mover para direita"
        >→</button>
      </div>

      <button
        class="control-btn w-16 h-16 rounded-2xl bg-slate-800/90 border border-slate-600 text-2xl active:scale-95"
        data-dir="down"
        aria-label="Mover para baixo"
      >↓</button>
    </div>

    <p class="text-xs text-slate-400 text-center md:hidden">
      Use os botões para jogar no celular
    </p>
  </div>

  <script>
    // --- CONSTANTES ---
    const WIDTH = 960;
    const HEIGHT = 540;
    const TILE = 30;
    const COLS = 28;
    const ROWS = 16;
    const BOARD_W = COLS * TILE;
    const BOARD_H = ROWS * TILE;
    const BOARD_X = Math.floor((WIDTH - BOARD_W) / 2);
    const BOARD_Y = 40;

    const PLAYER_RADIUS = 11;
    const GHOST_RADIUS = 11;
    const PLAYER_SPEED = 185;
    const PELLET_RADIUS = 3;
    const POWER_PELLET_RADIUS = 7;
    const TURN_SNAP = 5;
    const FRIGHT_TIME = 6.0;

    const DIRS = {
      left: [-1, 0],
      right: [1, 0],
      up: [0, -1],
      down: [0, 1]
    };

    const OPPOSITE = {
      left: "right",
      right: "left",
      up: "down",
      down: "up"
    };

    const KEY_TO_DIR = {
      arrowleft: "left", arrowright: "right", arrowup: "up", arrowdown: "down",
      a: "left", d: "right", w: "up", s: "down"
    };

    // --- DADOS DOS NÍVEIS ---
    const LEVELS = [
      {
        bg: "#050814", wall_color: "#1a4fff", player_spawn: [14, 13],
        ghost_spawns: [[13, 7], [14, 7]], ghost_speed: 128, tunnel_rows: [7],
        power_pellets: [[1, 1], [26, 1], [1, 14], [26, 14]],
        wall_blocks: [
          [0, 0, 28, 1], [0, 15, 28, 1], [0, 0, 1, 16], [27, 0, 1, 16],
          [3, 2, 6, 1], [10, 2, 8, 1], [19, 2, 6, 1],
          [3, 4, 1, 3], [24, 4, 1, 3], [6, 4, 16, 1],
          [6, 6, 1, 3], [21, 6, 1, 3], [9, 8, 10, 1],
          [3, 10, 6, 1], [19, 10, 6, 1], [10, 12, 8, 1]
        ]
      },
      {
        bg: "#040c1a", wall_color: "#2f6bff", player_spawn: [14, 14],
        ghost_spawns: [[12, 7], [14, 7], [16, 7]], ghost_speed: 144, tunnel_rows: [7],
        power_pellets: [[1, 1], [26, 1], [1, 14], [26, 14]],
        wall_blocks: [
          [0, 0, 28, 1], [0, 15, 28, 1], [0, 0, 1, 16], [27, 0, 1, 16],
          [2, 2, 10, 1], [16, 2, 10, 1], [2, 4, 1, 8], [25, 4, 1, 8],
          [5, 4, 8, 1], [15, 4, 8, 1], [7, 6, 1, 6], [20, 6, 1, 6],
          [10, 8, 8, 1], [4, 12, 8, 1], [16, 12, 8, 1],
          [13, 2, 2, 3], [13, 11, 2, 3]
        ]
      },
      {
        bg: "#020b18", wall_color: "#3b80ff", player_spawn: [14, 14],
        ghost_spawns: [[11, 7], [13, 7], [15, 7], [17, 7]], ghost_speed: 162, tunnel_rows: [7],
        power_pellets: [[1, 1], [26, 1], [1, 14], [26, 14]],
        wall_blocks: [
          [0, 0, 28, 1], [0, 15, 28, 1], [0, 0, 1, 16], [27, 0, 1, 16],
          [2, 2, 24, 1], [2, 13, 24, 1], [2, 2, 1, 12], [25, 2, 1, 12],
          [6, 4, 16, 1], [6, 11, 16, 1], [6, 4, 1, 8], [21, 4, 1, 8],
          [10, 6, 8, 1], [10, 9, 8, 1], [4, 7, 4, 1], [20, 7, 4, 1],
          [8, 2, 1, 3], [19, 2, 1, 3], [8, 11, 1, 3], [19, 11, 1, 3]
        ]
      }
    ];

    class Ghost {
      constructor(spawnTile, color, baseSpeed, tileCenterFn) {
        this.spawnTile = spawnTile;
        this.color = color;
        this.baseSpeed = baseSpeed;
        const dirs = ["left", "right", "up", "down"];
        this.dir = dirs[Math.floor(Math.random() * dirs.length)];

        const pos = tileCenterFn(spawnTile[0], spawnTile[1]);
        this.x = pos.x;
        this.y = pos.y;
      }

      reset(tileCenterFn) {
        const pos = tileCenterFn(this.spawnTile[0], this.spawnTile[1]);
        this.x = pos.x;
        this.y = pos.y;
        const dirs = ["left", "right", "up", "down"];
        this.dir = dirs[Math.floor(Math.random() * dirs.length)];
      }
    }

    class GameApp {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");

        this.levelIndex = 0;
        this.score = 0;
        this.lives = 3;
        this.state = "playing";

        this.player = { x: 0, y: 0, dir: "left", nextDir: "left", moving: false };

        this.walls = new Set();
        this.pellets = new Set();
        this.powerPellets = new Set();
        this.tunnelRows = new Set();
        this.ghosts = [];

        this.frightTimer = 0.0;
        this.freezeTimer = 0.0;
        this.animClock = 0.0;

        this.touchStartX = 0;
        this.touchStartY = 0;

        this.loadLevel(0);
        this.bindEvents();

        this.lastTime = performance.now();
        requestAnimationFrame((now) => this.tick(now));
      }

      bindEvents() {
        window.addEventListener("keydown", (e) => this.onKeyPress(e), { passive: false });

        // Mantém foco para teclado físico
        this.canvas.addEventListener("click", () => this.canvas.focus());
        this.canvas.addEventListener("touchstart", () => this.canvas.focus(), { passive: true });

        // Swipe no canvas (opcional)
        this.canvas.addEventListener("touchstart", (e) => this.onTouchStart(e), { passive: true });
        this.canvas.addEventListener("touchend", (e) => this.onTouchEnd(e), { passive: true });

        // Botões touch
        document.querySelectorAll("[data-dir]").forEach((btn) => {
          const dir = btn.dataset.dir;

          const setDir = (e) => {
            if (e) e.preventDefault();
            this.player.nextDir = dir;
            this.canvas.focus();
          };

          btn.addEventListener("touchstart", setDir, { passive: false });
          btn.addEventListener("mousedown", setDir);
          btn.addEventListener("click", setDir);
        });

        const restartBtn = document.getElementById("restartBtn");
        if (restartBtn) {
          const restart = (e) => {
            if (e) e.preventDefault();
            this.restartGame();
            this.canvas.focus();
          };

          restartBtn.addEventListener("touchstart", restart, { passive: false });
          restartBtn.addEventListener("mousedown", restart);
          restartBtn.addEventListener("click", restart);
        }
      }

      onTouchStart(e) {
        const touch = e.changedTouches[0];
        this.touchStartX = touch.clientX;
        this.touchStartY = touch.clientY;
      }

      onTouchEnd(e) {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - this.touchStartX;
        const dy = touch.clientY - this.touchStartY;

        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        const minSwipe = 24;

        if (Math.max(absX, absY) < minSwipe) return;

        if (absX > absY) {
          this.player.nextDir = dx > 0 ? "right" : "left";
        } else {
          this.player.nextDir = dy > 0 ? "down" : "up";
        }
      }

      toKey(col, row) { return `${col},${row}`; }

      onKeyPress(e) {
        const key = e.key.toLowerCase();

        if (key === "r") {
          this.restartGame();
          e.preventDefault();
          return;
        }

        if (KEY_TO_DIR[key]) {
          this.player.nextDir = KEY_TO_DIR[key];
          e.preventDefault();
        }
      }

      restartGame() {
        this.levelIndex = 0;
        this.score = 0;
        this.lives = 3;
        this.state = "playing";
        this.loadLevel(0);
      }

      tileCenter(col, row) {
        return {
          x: BOARD_X + col * TILE + TILE / 2,
          y: BOARD_Y + row * TILE + TILE / 2
        };
      }

      worldToTile(x, y) {
        let col = Math.floor((x - BOARD_X) / TILE);
        let row = Math.floor((y - BOARD_Y) / TILE);
        col = Math.max(0, Math.min(COLS - 1, col));
        row = Math.max(0, Math.min(ROWS - 1, row));
        return { col, row };
      }

      loadLevel(index) {
        const level = LEVELS[index];
        this.bg = level.bg;
        this.wallColor = level.wall_color;
        this.tunnelRows = new Set(level.tunnel_rows);
        this.playerSpawn = level.player_spawn;

        this.walls.clear();
        for (let [x, y, w, h] of level.wall_blocks) {
          for (let c = x; c < x + w; c++) {
            for (let r = y; r < y + h; r++) {
              if (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                this.walls.add(this.toKey(c, r));
              }
            }
          }
        }

        for (let row of this.tunnelRows) {
          this.walls.delete(this.toKey(0, row));
          this.walls.delete(this.toKey(COLS - 1, row));
        }

        let reserved = new Set([this.toKey(this.playerSpawn[0], this.playerSpawn[1])]);
        let ghostSpawns = level.ghost_spawns;
        ghostSpawns.forEach(s => reserved.add(this.toKey(s[0], s[1])));

        for (let [gx, gy] of ghostSpawns) {
          for (let c = gx - 1; c <= gx + 1; c++) {
            for (let r = gy - 1; r <= gy + 1; r++) {
              if (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                reserved.add(this.toKey(c, r));
              }
            }
          }
        }

        this.powerPellets.clear();
        for (let [c, r] of level.power_pellets) {
          let key = this.toKey(c, r);
          if (!this.walls.has(key) && !reserved.has(key)) {
            this.powerPellets.add(key);
          }
        }

        this.pellets.clear();
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS; r++) {
            let key = this.toKey(c, r);
            if (!this.walls.has(key) && !reserved.has(key) && !this.powerPellets.has(key)) {
              this.pellets.add(key);
            }
          }
        }

        const ghostColors = ["#ff4d4d", "#ff9f43", "#5bb8ff", "#ff79d1"];
        this.ghosts = [];
        for (let i = 0; i < ghostSpawns.length; i++) {
          let color = ghostColors[i % ghostColors.length];
          let speed = level.ghost_speed + i * 6;
          this.ghosts.push(new Ghost(ghostSpawns[i], color, speed, this.tileCenter.bind(this)));
        }

        this.frightTimer = 0.0;
        this.freezeTimer = 0.65;
        this.resetPositions();
      }

      resetPositions() {
        const pos = this.tileCenter(this.playerSpawn[0], this.playerSpawn[1]);
        this.player.x = pos.x;
        this.player.y = pos.y;
        this.player.dir = "left";
        this.player.nextDir = "left";
        this.player.moving = false;

        this.ghosts.forEach(g => g.reset(this.tileCenter.bind(this)));
      }

      circleRectHit(cx, cy, radius, rx, ry, rw, rh) {
        let nearestX = Math.max(rx, Math.min(cx, rx + rw));
        let nearestY = Math.max(ry, Math.min(cy, ry + rh));
        let dx = cx - nearestX;
        let dy = cy - nearestY;
        return (dx * dx + dy * dy) <= (radius * radius);
      }

      circleHitsWall(cx, cy, radius) {
        if (cx - radius < BOARD_X || cx + radius > BOARD_X + BOARD_W ||
            cy - radius < BOARD_Y || cy + radius > BOARD_Y + BOARD_H) {
          return true;
        }

        let minCol = Math.max(0, Math.floor((cx - radius - BOARD_X) / TILE));
        let maxCol = Math.min(COLS - 1, Math.floor((cx + radius - BOARD_X) / TILE));
        let minRow = Math.max(0, Math.floor((cy - radius - BOARD_Y) / TILE));
        let maxRow = Math.min(ROWS - 1, Math.floor((cy + radius - BOARD_Y) / TILE));

        for (let c = minCol; c <= maxCol; c++) {
          for (let r = minRow; r <= maxRow; r++) {
            if (!this.walls.has(this.toKey(c, r))) continue;
            let rx = BOARD_X + c * TILE;
            let ry = BOARD_Y + r * TILE;
            if (this.circleRectHit(cx, cy, radius, rx, ry, TILE, TILE)) return true;
          }
        }
        return false;
      }

      applyTunnelWrap(x, y, radius) {
        let row = Math.floor((y - BOARD_Y) / TILE);
        if (this.tunnelRows.has(row)) {
          let left = BOARD_X - radius;
          let right = BOARD_X + BOARD_W + radius;
          if (x < left) x = BOARD_X + BOARD_W - radius - 1;
          else if (x > right) x = BOARD_X + radius + 1;
        }
        return { x, y };
      }

      tryMove(x, y, dir, speed, dt, radius) {
        if (!DIRS[dir]) return { x, y, ok: false };
        let [dx, dy] = DIRS[dir];
        let nx = x + dx * speed * dt;
        let ny = y + dy * speed * dt;

        let wrapped = this.applyTunnelWrap(nx, ny, radius);
        nx = wrapped.x;
        ny = wrapped.y;

        if (this.circleHitsWall(nx, ny, radius)) return { x, y, ok: false };
        return { x: nx, y: ny, ok: true };
      }

      atTileCenter(x, y, tol = 4) {
        let { col, row } = this.worldToTile(x, y);
        let pos = this.tileCenter(col, row);
        return Math.abs(x - pos.x) <= tol && Math.abs(y - pos.y) <= tol;
      }

      snapForTurn(desiredDir) {
        let { col, row } = this.worldToTile(this.player.x, this.player.y);
        let pos = this.tileCenter(col, row);

        if (["up", "down"].includes(desiredDir) && ["left", "right"].includes(this.player.dir)) {
          if (Math.abs(this.player.x - pos.x) <= TURN_SNAP) this.player.x = pos.x;
        }
        if (["left", "right"].includes(desiredDir) && ["up", "down"].includes(this.player.dir)) {
          if (Math.abs(this.player.y - pos.y) <= TURN_SNAP) this.player.y = pos.y;
        }
      }

      availableDirs(x, y, speed, radius) {
        let options = [];
        for (let dir in DIRS) {
          let res = this.tryMove(x, y, dir, speed, 0.04, radius);
          if (res.ok) options.push(dir);
        }
        return options;
      }

      updatePlayer(dt) {
        this.snapForTurn(this.player.nextDir);

        let resTurn = this.tryMove(this.player.x, this.player.y, this.player.nextDir, PLAYER_SPEED, 0.04, PLAYER_RADIUS);
        if (resTurn.ok) this.player.dir = this.player.nextDir;

        let resMove = this.tryMove(this.player.x, this.player.y, this.player.dir, PLAYER_SPEED, dt, PLAYER_RADIUS);
        if (resMove.ok) {
          this.player.x = resMove.x;
          this.player.y = resMove.y;
        }
        this.player.moving = resMove.ok;
      }

      chooseGhostDir(ghost, options) {
        if (options.length === 0) return ghost.dir;

        let choices = [...options];
        if (OPPOSITE[ghost.dir] && choices.length > 1) {
          let opposite = OPPOSITE[ghost.dir];
          let filtered = choices.filter(d => d !== opposite);
          if (filtered.length > 0) choices = filtered;
        }

        if (this.frightTimer > 0) {
          return choices[Math.floor(Math.random() * choices.length)];
        }

        if (Math.random() < 0.70) {
          let targetX = this.player.x;
          let targetY = this.player.y;

          let bestDir = choices[0];
          let minDistSq = Infinity;

          for (let dir of choices) {
            let [dx, dy] = DIRS[dir];
            let testX = ghost.x + dx * TILE;
            let testY = ghost.y + dy * TILE;
            let distSq = (testX - targetX) ** 2 + (testY - targetY) ** 2;

            if (distSq < minDistSq) {
              minDistSq = distSq;
              bestDir = dir;
            }
          }
          return bestDir;
        }

        return choices[Math.floor(Math.random() * choices.length)];
      }

      updateGhosts(dt) {
        for (let ghost of this.ghosts) {
          let speed = ghost.baseSpeed;
          if (this.frightTimer > 0) speed *= 0.64;

          let options = this.availableDirs(ghost.x, ghost.y, speed, GHOST_RADIUS);
          let atCenter = this.atTileCenter(ghost.x, ghost.y, 4);

          if (!options.includes(ghost.dir)) {
            ghost.dir = this.chooseGhostDir(ghost, options);
          } else if (atCenter && options.length > 1) {
            ghost.dir = this.chooseGhostDir(ghost, options);
          }

          let res = this.tryMove(ghost.x, ghost.y, ghost.dir, speed, dt, GHOST_RADIUS);
          if (res.ok) {
            ghost.x = res.x;
            ghost.y = res.y;
          } else {
            ghost.dir = this.chooseGhostDir(ghost, options);
          }
        }
      }

      checkPelletPickup() {
        let { col, row } = this.worldToTile(this.player.x, this.player.y);
        let key = this.toKey(col, row);

        if (this.pellets.has(key)) {
          this.pellets.delete(key);
          this.score += 10;
        }

        if (this.powerPellets.has(key)) {
          this.powerPellets.delete(key);
          this.score += 50;
          this.frightTimer = FRIGHT_TIME;
        }
      }

      checkGhostHits() {
        let hitDistanceSq = Math.pow(PLAYER_RADIUS + GHOST_RADIUS - 2, 2);
        for (let ghost of this.ghosts) {
          let dx = this.player.x - ghost.x;
          let dy = this.player.y - ghost.y;
          if ((dx * dx + dy * dy) > hitDistanceSq) continue;

          if (this.frightTimer > 0) {
            this.score += 200;
            ghost.reset(this.tileCenter.bind(this));
            continue;
          }

          this.lives -= 1;
          if (this.lives <= 0) {
            this.state = "game_over";
          } else {
            this.freezeTimer = 0.9;
            this.resetPositions();
          }
          return;
        }
      }

      checkLevelComplete() {
        if (this.pellets.size > 0 || this.powerPellets.size > 0) return;

        this.levelIndex += 1;
        if (this.levelIndex >= LEVELS.length) {
          this.state = "won";
          return;
        }
        this.loadLevel(this.levelIndex);
      }

      update(dt) {
        if (this.state !== "playing") return;

        this.animClock += dt;

        if (this.frightTimer > 0) this.frightTimer = Math.max(0, this.frightTimer - dt);

        if (this.freezeTimer > 0) {
          this.freezeTimer = Math.max(0, this.freezeTimer - dt);
          return;
        }

        this.updatePlayer(dt);
        this.updateGhosts(dt);
        this.checkPelletPickup();
        this.checkGhostHits();
        this.checkLevelComplete();
      }

      draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = "#05060c";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = this.bg;
        ctx.strokeStyle = "#1a1f2f";
        ctx.lineWidth = 2;
        ctx.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
        ctx.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);

        ctx.fillStyle = this.wallColor;
        ctx.strokeStyle = "#10226b";
        ctx.lineWidth = 1;
        for (let key of this.walls) {
          let [c, r] = key.split(",").map(Number);
          let x = BOARD_X + c * TILE;
          let y = BOARD_Y + r * TILE;
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeRect(x, y, TILE, TILE);
        }

        ctx.fillStyle = "#ffdca1";
        for (let key of this.pellets) {
          let [c, r] = key.split(",").map(Number);
          let pos = this.tileCenter(c, r);
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, PELLET_RADIUS, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "#ffffff";
        let pulse = 1.0 + 0.20 * Math.sin(this.animClock * 8);
        for (let key of this.powerPellets) {
          let [c, r] = key.split(",").map(Number);
          let pos = this.tileCenter(c, r);
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, POWER_PELLET_RADIUS * pulse, 0, Math.PI * 2);
          ctx.fill();
        }

        for (let ghost of this.ghosts) {
          this.drawGhost(ghost);
        }

        this.drawPlayer();

        ctx.fillStyle = "#f0f0f0";
        ctx.font = "bold 18px monospace";
        ctx.textAlign = "left";
        let totalPellets = this.pellets.size + this.powerPellets.size;
        ctx.fillText(`Fase: ${Math.min(this.levelIndex + 1, 3)}/3    Score: ${this.score}    Vidas: ${this.lives}    Pellets: ${totalPellets}`, 18, 26);

        ctx.fillStyle = "#d2d8e4";
        ctx.font = "14px monospace";
        ctx.textAlign = "center";
        ctx.fillText("Setas/WASD mover | R reinicia | Celular: botões ou swipe", WIDTH / 2, HEIGHT - 14);

        if (this.freezeTimer > 0 && this.state === "playing") {
          ctx.fillStyle = "#fff3a0";
          ctx.font = "bold 34px monospace";
          ctx.fillText("PRONTO!", WIDTH / 2, BOARD_Y + BOARD_H / 2 + 12);
        }

        if (this.state === "game_over") this.drawOverlay("GAME OVER", "Pressione R para reiniciar", "#ff6d6d");
        if (this.state === "won") this.drawOverlay("VOCÊ VENCEU!", "Pressione R para jogar novamente", "#63f28d");
      }

      drawPlayer() {
        let mouth = this.player.moving ? 20 + 18 * Math.abs(Math.sin(this.animClock * 14)) : 12;

        const angles = {
          right: 0,
          down: 90,
          left: 180,
          up: 270
        };
        let baseAngle = angles[this.player.dir];

        let startAngle = (baseAngle + mouth / 2) * Math.PI / 180;
        let endAngle = (baseAngle + 360 - mouth / 2) * Math.PI / 180;

        this.ctx.fillStyle = "#ffd84d";
        this.ctx.beginPath();
        this.ctx.moveTo(this.player.x, this.player.y);
        this.ctx.arc(this.player.x, this.player.y, PLAYER_RADIUS, startAngle, endAngle);
        this.ctx.fill();
      }

      drawGhost(ghost) {
        let x = ghost.x;
        let y = ghost.y;
        let r = GHOST_RADIUS;
        let ctx = this.ctx;

        let color = ghost.color;
        if (this.frightTimer > 0) {
          color = "#2f63ff";
          if (this.frightTimer < 2.0 && Math.floor(this.animClock * 10) % 2 === 0) {
            color = "#f2f2f2";
          }
        }

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, Math.PI, 0);
        ctx.lineTo(x + r, y + r);
        ctx.lineTo(x + r * 0.35, y + r * 0.5);
        ctx.lineTo(x - r * 0.1, y + r);
        ctx.lineTo(x - r * 0.55, y + r * 0.5);
        ctx.lineTo(x - r, y + r);
        ctx.lineTo(x - r, y);
        ctx.fill();

        let eyeY = y - r * 0.10;
        let eyeDx = r * 0.38;
        let eyeR = r * 0.28;

        let [dirDx, dirDy] = DIRS[ghost.dir] || [0, 0];
        let pupilDx = dirDx * 2.2;
        let pupilDy = dirDy * 2.2;

        for (let side of [-1, 1]) {
          let ex = x + side * eyeDx;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(ex, eyeY, eyeR, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#111111";
          ctx.beginPath();
          ctx.arc(ex + pupilDx, eyeY + pupilDy, eyeR * 0.45, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      drawOverlay(title, subtitle, color) {
        let ctx = this.ctx;
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.textAlign = "center";
        ctx.fillStyle = color;
        ctx.font = "bold 48px monospace";
        ctx.fillText(title, WIDTH / 2, HEIGHT / 2 - 10);

        ctx.fillStyle = "#f0f0f0";
        ctx.font = "20px monospace";
        ctx.fillText(subtitle, WIDTH / 2, HEIGHT / 2 + 35);
      }

      tick(now) {
        let dt = (now - this.lastTime) / 1000.0;
        this.lastTime = now;
        dt = Math.min(dt, 1.0 / 20.0);

        this.update(dt);
        this.draw();

        requestAnimationFrame((n) => this.tick(n));
      }
    }

    window.onload = () => {
      const game = new GameApp("gameCanvas");
      window.__pacmanGame = game;
    };
  </script>
</body>
